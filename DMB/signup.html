<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DMsgBox — Create Account</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    .gradient-text {
      background: linear-gradient(135deg, #2DD4BF 0%, #38BDF8 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .focus-ring:focus-visible { outline: 2px solid #2DD4BF; outline-offset: 3px; }
  </style>
</head>
<body class="bg-[#0F172A] text-slate-100 antialiased min-h-screen flex items-center justify-center px-4 py-16">

  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <a href="index.html" class="text-xl font-bold tracking-tight text-white">
        DMsg<span class="gradient-text">Box</span>
      </a>
      <h1 class="mt-3 text-2xl font-extrabold text-white">Create your account</h1>
      <p class="mt-2 text-slate-400 text-sm">Join the waitlist and get early access</p>
    </div>

    <div class="rounded-2xl bg-[#1E293B] border border-white/5 p-8">
      <form id="signup-form" class="space-y-5" novalidate>

        <div>
          <label for="name" class="block text-sm font-semibold text-slate-300 mb-2">Full Name <span class="text-teal-400">*</span></label>
          <input id="name" name="name" type="text" required autocomplete="name" placeholder="Jane Tan"
            class="w-full px-4 py-3 rounded-xl bg-[#0F172A] border border-white/10 text-white placeholder-slate-600 text-sm focus-ring focus:border-teal-500/50 transition-colors hover:border-white/20" />
        </div>

        <div>
          <label for="email" class="block text-sm font-semibold text-slate-300 mb-2">Work Email <span class="text-teal-400">*</span></label>
          <input id="email" name="email" type="email" required autocomplete="email" placeholder="jane@company.com.sg"
            class="w-full px-4 py-3 rounded-xl bg-[#0F172A] border border-white/10 text-white placeholder-slate-600 text-sm focus-ring focus:border-teal-500/50 transition-colors hover:border-white/20" />
        </div>

        <div>
          <label for="password" class="block text-sm font-semibold text-slate-300 mb-2">Password <span class="text-teal-400">*</span></label>
          <input id="password" name="password" type="password" required autocomplete="new-password" placeholder="Min. 8 characters"
            class="w-full px-4 py-3 rounded-xl bg-[#0F172A] border border-white/10 text-white placeholder-slate-600 text-sm focus-ring focus:border-teal-500/50 transition-colors hover:border-white/20" />
        </div>

        <div id="form-error" class="hidden text-sm text-red-400 font-medium bg-red-400/10 rounded-lg px-4 py-3"></div>
        <div id="form-success" class="hidden text-sm text-teal-400 font-medium bg-teal-400/10 rounded-lg px-4 py-3"></div>

        <button type="submit" id="submit-btn"
          class="w-full px-6 py-3.5 rounded-xl bg-teal-600 text-white font-bold text-sm hover:bg-teal-500 active:scale-[0.98] transition-all focus-ring">
          Create Account
        </button>
      </form>

      <p class="mt-6 text-center text-sm text-slate-500">
        Already have an account?
        <a href="login.html" class="text-teal-400 font-semibold hover:text-teal-300 transition-colors">Sign in</a>
      </p>
    </div>

    <p class="mt-6 text-center text-xs text-slate-600">
      <a href="index.html" class="hover:text-slate-400 transition-colors">← Back to home</a>
    </p>
  </div>

  <script>
    const SUPABASE_URL      = 'https://bjpwckpmktnwtdzpmnvn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJqcHdja3Bta3Rud3RkenBtbnZuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwMDc1NTAsImV4cCI6MjA5MjU4MzU1MH0.BMHQDBEANQdZhm4_62Jh9sewdZnAxOZzvKcZCPUoDd0';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const errEl     = document.getElementById('form-error');
    const successEl = document.getElementById('form-success');

    function showError(msg)   { errEl.textContent = msg;     errEl.classList.remove('hidden');     successEl.classList.add('hidden'); }
    function showSuccess(msg) { successEl.textContent = msg; successEl.classList.remove('hidden'); errEl.classList.add('hidden'); }

    // Redirect if already logged in
    sb.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = 'dashboard.html';
    });

    document.getElementById('signup-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name     = document.getElementById('name').value.trim();
      const email    = document.getElementById('email').value.trim().toLowerCase();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('submit-btn');

      if (password.length < 8) { showError('Password must be at least 8 characters.'); return; }

      btn.disabled = true;
      btn.textContent = 'Creating account…';
      errEl.classList.add('hidden');

      // 1. Create auth user
      const { data, error: authError } = await sb.auth.signUp({ email, password,
        options: { data: { name } }
      });

      if (authError) {
        showError(authError.message);
        btn.disabled = false;
        btn.textContent = 'Create Account';
        return;
      }

      // 2. Insert profile row
      if (data.user) {
        await sb.from('profiles').upsert({ id: data.user.id, name });

        // 3. Add to waitlist subscribers (ignore duplicate)
        await sb.from('subscribers').insert({ name, email }).maybeSingle();
      }

      btn.disabled = false;
      btn.textContent = 'Create Account';
      showSuccess('✓ Account created! Check your email to confirm, then sign in.');
      e.target.reset();
    });
  </script>
</body>
</html>
