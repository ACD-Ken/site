<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DMsgBox — Reset Password</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    .gradient-text {
      background: linear-gradient(135deg, #2DD4BF 0%, #38BDF8 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .focus-ring:focus-visible { outline: 2px solid #2DD4BF; outline-offset: 3px; }
  </style>
</head>
<body class="bg-[#0F172A] text-slate-100 antialiased min-h-screen flex items-center justify-center px-4 py-16">

  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <a href="index.html" class="text-xl font-bold tracking-tight text-white">
        DMsg<span class="gradient-text">Box</span>
      </a>
    </div>

    <!-- Step 1: Request reset email -->
    <div id="screen-request" class="rounded-2xl bg-[#1E293B] border border-white/5 p-8">
      <h1 class="text-2xl font-extrabold text-white mb-2">Reset your password</h1>
      <p class="text-slate-400 text-sm mb-6">Enter your email and we'll send you a reset link.</p>

      <form id="request-form" class="space-y-5" novalidate>
        <div>
          <label for="reset-email" class="block text-sm font-semibold text-slate-300 mb-2">Email</label>
          <input id="reset-email" type="email" required autocomplete="email" placeholder="jane@company.com.sg"
            class="w-full px-4 py-3 rounded-xl bg-[#0F172A] border border-white/10 text-white placeholder-slate-600 text-sm focus-ring focus:border-teal-500/50 transition-colors hover:border-white/20" />
        </div>
        <div id="request-error"   class="hidden text-sm text-red-400 bg-red-400/10 rounded-lg px-4 py-3"></div>
        <div id="request-success" class="hidden text-sm text-teal-400 bg-teal-400/10 rounded-lg px-4 py-3"></div>
        <button type="submit" id="request-btn"
          class="w-full px-6 py-3.5 rounded-xl bg-teal-600 text-white font-bold text-sm hover:bg-teal-500 active:scale-[0.98] transition-all focus-ring">
          Send Reset Link
        </button>
      </form>

      <p class="mt-6 text-center text-sm text-slate-500">
        <a href="login.html" class="text-teal-400 font-semibold hover:text-teal-300 transition-colors">← Back to sign in</a>
      </p>
    </div>

    <!-- Step 2: Set new password (shown when access_token is in URL) -->
    <div id="screen-newpass" class="hidden rounded-2xl bg-[#1E293B] border border-white/5 p-8">
      <h1 class="text-2xl font-extrabold text-white mb-2">Set new password</h1>
      <p class="text-slate-400 text-sm mb-6">Choose a new password for your account.</p>

      <form id="newpass-form" class="space-y-5" novalidate>
        <div>
          <label for="new-password" class="block text-sm font-semibold text-slate-300 mb-2">New Password</label>
          <input id="new-password" type="password" required autocomplete="new-password" placeholder="Min. 8 characters"
            class="w-full px-4 py-3 rounded-xl bg-[#0F172A] border border-white/10 text-white placeholder-slate-600 text-sm focus-ring focus:border-teal-500/50 transition-colors hover:border-white/20" />
        </div>
        <div>
          <label for="confirm-password" class="block text-sm font-semibold text-slate-300 mb-2">Confirm Password</label>
          <input id="confirm-password" type="password" required autocomplete="new-password" placeholder="Repeat password"
            class="w-full px-4 py-3 rounded-xl bg-[#0F172A] border border-white/10 text-white placeholder-slate-600 text-sm focus-ring focus:border-teal-500/50 transition-colors hover:border-white/20" />
        </div>
        <div id="newpass-error"   class="hidden text-sm text-red-400 bg-red-400/10 rounded-lg px-4 py-3"></div>
        <div id="newpass-success" class="hidden text-sm text-teal-400 bg-teal-400/10 rounded-lg px-4 py-3"></div>
        <button type="submit" id="newpass-btn"
          class="w-full px-6 py-3.5 rounded-xl bg-teal-600 text-white font-bold text-sm hover:bg-teal-500 active:scale-[0.98] transition-all focus-ring">
          Update Password
        </button>
      </form>
    </div>

    <p class="mt-6 text-center text-xs text-slate-600">
      <a href="index.html" class="hover:text-slate-400 transition-colors">← Back to home</a>
    </p>
  </div>

  <script>
    const SUPABASE_URL      = 'https://bjpwckpmktnwtdzpmnvn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJqcHdja3Bta3Rud3RkenBtbnZuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwMDc1NTAsImV4cCI6MjA5MjU4MzU1MH0.BMHQDBEANQdZhm4_62Jh9sewdZnAxOZzvKcZCPUoDd0';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // If URL contains access_token, show the new password form
    const hash = window.location.hash;
    if (hash && hash.includes('access_token')) {
      document.getElementById('screen-request').classList.add('hidden');
      document.getElementById('screen-newpass').classList.remove('hidden');
    }

    // ── Request reset email ──────────────────────────────────────
    document.getElementById('request-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email  = document.getElementById('reset-email').value.trim().toLowerCase();
      const btn    = document.getElementById('request-btn');
      const errEl  = document.getElementById('request-error');
      const sucEl  = document.getElementById('request-success');

      btn.disabled = true;
      btn.textContent = 'Sending…';
      errEl.classList.add('hidden');
      sucEl.classList.add('hidden');

      const { error } = await sb.auth.resetPasswordForEmail(email, {
        redirectTo: 'https://acd-ken.github.io/site/DMB/reset-password.html',
      });

      btn.disabled = false;
      btn.textContent = 'Send Reset Link';

      if (error) {
        errEl.textContent = error.message;
        errEl.classList.remove('hidden');
      } else {
        sucEl.textContent = '✓ Reset link sent — check your inbox.';
        sucEl.classList.remove('hidden');
        e.target.reset();
      }
    });

    // ── Set new password ─────────────────────────────────────────
    document.getElementById('newpass-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('new-password').value;
      const confirm  = document.getElementById('confirm-password').value;
      const btn      = document.getElementById('newpass-btn');
      const errEl    = document.getElementById('newpass-error');
      const sucEl    = document.getElementById('newpass-success');

      errEl.classList.add('hidden');
      sucEl.classList.add('hidden');

      if (password.length < 8) { errEl.textContent = 'Password must be at least 8 characters.'; errEl.classList.remove('hidden'); return; }
      if (password !== confirm) { errEl.textContent = 'Passwords do not match.'; errEl.classList.remove('hidden'); return; }

      btn.disabled = true;
      btn.textContent = 'Updating…';

      const { error } = await sb.auth.updateUser({ password });

      btn.disabled = false;
      btn.textContent = 'Update Password';

      if (error) {
        errEl.textContent = error.message;
        errEl.classList.remove('hidden');
      } else {
        sucEl.textContent = '✓ Password updated! Redirecting to sign in…';
        sucEl.classList.remove('hidden');
        setTimeout(() => window.location.href = 'login.html', 2000);
      }
    });
  </script>
</body>
</html>
