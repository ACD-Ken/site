<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DMsgBox — Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    .focus-ring:focus-visible { outline: 2px solid #2DD4BF; outline-offset: 3px; }
  </style>
</head>

<body class="bg-[#0F172A] text-slate-100 antialiased min-h-screen">

  <!-- ── LOGIN SCREEN ─────────────────────────────────────────── -->
  <div id="screen-login" class="min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-sm">
      <div class="text-center mb-8">
        <a href="index.html" class="text-lg font-bold tracking-tight text-white">
          DMsg<span class="bg-gradient-to-r from-teal-400 to-sky-400 bg-clip-text text-transparent">Box</span>
        </a>
        <p class="mt-2 text-slate-400 text-sm">Admin — Waitlist Subscribers</p>
      </div>

      <div class="rounded-2xl bg-[#1E293B] border border-white/5 p-8">
        <form id="login-form" class="space-y-5">
          <div>
            <label for="admin-email" class="block text-sm font-semibold text-slate-300 mb-2">Email</label>
            <input
              id="admin-email"
              type="email"
              required
              autocomplete="email"
              placeholder="you@example.com"
              class="w-full px-4 py-3 rounded-xl bg-[#0F172A] border border-white/10 text-white placeholder-slate-600 text-sm focus-ring focus:border-teal-500/50 transition-colors"
            />
          </div>
          <div>
            <label for="admin-password" class="block text-sm font-semibold text-slate-300 mb-2">Password</label>
            <input
              id="admin-password"
              type="password"
              required
              autocomplete="current-password"
              placeholder="••••••••"
              class="w-full px-4 py-3 rounded-xl bg-[#0F172A] border border-white/10 text-white placeholder-slate-600 text-sm focus-ring focus:border-teal-500/50 transition-colors"
            />
          </div>
          <div id="login-error" class="hidden text-sm text-red-400 font-medium"></div>
          <button
            type="submit"
            id="login-btn"
            class="w-full px-6 py-3.5 rounded-xl bg-teal-600 text-white font-bold text-sm hover:bg-teal-500 transition-colors focus-ring"
          >
            Sign In
          </button>
        </form>
      </div>
    </div>
  </div>

  <!-- ── DASHBOARD SCREEN ─────────────────────────────────────── -->
  <div id="screen-dashboard" class="hidden min-h-screen">

    <!-- Nav -->
    <header class="fixed top-0 left-0 right-0 z-50 border-b border-white/5 bg-[#0F172A]/90 backdrop-blur-md">
      <div class="max-w-6xl mx-auto px-5 sm:px-8 h-16 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <a href="index.html" class="text-lg font-bold tracking-tight text-white">
            DMsg<span class="bg-gradient-to-r from-teal-400 to-sky-400 bg-clip-text text-transparent">Box</span>
          </a>
          <span class="text-slate-600">|</span>
          <span class="text-sm text-slate-400 font-medium">Admin</span>
        </div>
        <div class="flex items-center gap-4">
          <span id="admin-user-email" class="text-xs text-slate-500 hidden sm:block"></span>
          <button
            id="logout-btn"
            class="text-sm font-semibold px-4 py-2 rounded-lg bg-white/5 text-slate-300 border border-white/10 hover:bg-white/10 transition-colors focus-ring"
          >
            Sign Out
          </button>
        </div>
      </div>
    </header>

    <main class="pt-24 pb-16 max-w-6xl mx-auto px-5 sm:px-8">

      <!-- Stats bar -->
      <div class="mb-8 flex flex-wrap gap-4">
        <div class="rounded-xl bg-[#1E293B] border border-white/5 px-6 py-4 flex items-center gap-4">
          <div>
            <p class="text-xs text-slate-500 uppercase tracking-widest font-semibold mb-1">Total Subscribers</p>
            <p id="stat-total" class="text-3xl font-extrabold text-white">—</p>
          </div>
        </div>
        <div class="rounded-xl bg-[#1E293B] border border-white/5 px-6 py-4 flex items-center gap-4">
          <div>
            <p class="text-xs text-slate-500 uppercase tracking-widest font-semibold mb-1">Latest Signup</p>
            <p id="stat-latest" class="text-sm font-semibold text-teal-400">—</p>
          </div>
        </div>
      </div>

      <!-- Table -->
      <div class="rounded-2xl bg-[#1E293B] border border-white/5 overflow-hidden">
        <div class="flex items-center justify-between px-6 py-4 border-b border-white/5">
          <h2 class="text-sm font-bold text-white uppercase tracking-widest">Waitlist Subscribers</h2>
          <button
            id="refresh-btn"
            class="text-xs font-semibold px-3 py-1.5 rounded-lg bg-teal-600/10 text-teal-400 border border-teal-600/20 hover:bg-teal-600/20 transition-colors focus-ring"
          >
            Refresh
          </button>
        </div>

        <div id="table-loading" class="px-6 py-12 text-center text-slate-500 text-sm">Loading…</div>
        <div id="table-empty"   class="hidden px-6 py-12 text-center text-slate-500 text-sm">No subscribers yet.</div>
        <div id="table-error"   class="hidden px-6 py-12 text-center text-red-400 text-sm"></div>

        <div id="table-wrap" class="hidden overflow-x-auto">
          <table class="w-full text-sm">
            <thead>
              <tr class="border-b border-white/5">
                <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-widest">#</th>
                <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-widest">Name</th>
                <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-widest">Email</th>
                <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-widest">Signed Up (SGT)</th>
              </tr>
            </thead>
            <tbody id="subscribers-tbody"></tbody>
          </table>
        </div>
      </div>

    </main>
  </div>

  <script>
    const SUPABASE_URL      = 'https://bjpwckpmktnwtdzpmnvn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJqcHdja3Bta3Rud3RkenBtbnZuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwMDc1NTAsImV4cCI6MjA5MjU4MzU1MH0.BMHQDBEANQdZhm4_62Jh9sewdZnAxOZzvKcZCPUoDd0';

    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const $ = id => document.getElementById(id);

    // ── Auth state ───────────────────────────────────────────────
    sb.auth.onAuthStateChange((event, session) => {
      if (session) {
        showDashboard(session.user);
        loadSubscribers();
      } else {
        showLogin();
      }
    });

    function showLogin() {
      $('screen-login').classList.remove('hidden');
      $('screen-dashboard').classList.add('hidden');
    }

    function showDashboard(user) {
      $('screen-login').classList.add('hidden');
      $('screen-dashboard').classList.remove('hidden');
      $('admin-user-email').textContent = user.email;
    }

    // ── Login ────────────────────────────────────────────────────
    $('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email    = $('admin-email').value.trim();
      const password = $('admin-password').value;
      const btn      = $('login-btn');
      const errEl    = $('login-error');

      btn.disabled = true;
      btn.textContent = 'Signing in…';
      errEl.classList.add('hidden');

      const { error } = await sb.auth.signInWithPassword({ email, password });

      btn.disabled = false;
      btn.textContent = 'Sign In';

      if (error) {
        errEl.textContent = error.message;
        errEl.classList.remove('hidden');
      }
    });

    // ── Logout ───────────────────────────────────────────────────
    $('logout-btn').addEventListener('click', () => sb.auth.signOut());

    // ── Load subscribers ─────────────────────────────────────────
    async function loadSubscribers() {
      $('table-loading').classList.remove('hidden');
      $('table-wrap').classList.add('hidden');
      $('table-empty').classList.add('hidden');
      $('table-error').classList.add('hidden');

      const { data, error } = await sb
        .from('subscribers')
        .select('*')
        .order('created_at', { ascending: false });

      $('table-loading').classList.add('hidden');

      if (error) {
        $('table-error').textContent = 'Error loading subscribers: ' + error.message;
        $('table-error').classList.remove('hidden');
        return;
      }

      if (!data.length) {
        $('table-empty').classList.remove('hidden');
        $('stat-total').textContent = '0';
        return;
      }

      $('stat-total').textContent = data.length;
      $('stat-latest').textContent = data[0].name + ' — ' + data[0].email;

      const tbody = $('subscribers-tbody');
      tbody.innerHTML = data.map((row, i) => `
        <tr class="border-b border-white/5 hover:bg-white/[0.02] transition-colors">
          <td class="px-6 py-4 text-slate-500">${data.length - i}</td>
          <td class="px-6 py-4 font-semibold text-white">${escHtml(row.name)}</td>
          <td class="px-6 py-4 text-teal-400">${escHtml(row.email)}</td>
          <td class="px-6 py-4 text-slate-400">${new Date(row.created_at).toLocaleString('en-SG', { timeZone: 'Asia/Singapore', dateStyle: 'medium', timeStyle: 'short' })}</td>
        </tr>
      `).join('');

      $('table-wrap').classList.remove('hidden');
    }

    $('refresh-btn').addEventListener('click', loadSubscribers);

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>

</body>
</html>
