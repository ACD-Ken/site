<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — DMsgBox</title>
  <meta name="robots" content="noindex,nofollow" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    .gradient-text {
      background: linear-gradient(135deg, #2DD4BF 0%, #38BDF8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .focus-ring:focus-visible { outline: 2px solid #2DD4BF; outline-offset: 3px; }
  </style>
</head>
<body class="bg-[#0F172A] text-slate-100 antialiased min-h-screen flex items-center justify-center px-5">

  <div class="w-full max-w-sm">

    <!-- Logo -->
    <div class="text-center mb-8">
      <a href="index.html" class="text-2xl font-bold tracking-tight text-white inline-block focus-ring rounded">
        DMsg<span class="gradient-text">Box</span>
      </a>
      <p class="mt-2 text-sm text-slate-500">Blog Admin Console</p>
    </div>

    <!-- Card -->
    <div class="rounded-2xl bg-[#1E293B] border border-white/5 p-8 shadow-2xl">
      <h1 class="text-xl font-bold text-white mb-6">Sign in</h1>

      <form id="login-form" class="space-y-4" novalidate>
        <div>
          <label for="email" class="block text-sm font-semibold text-slate-300 mb-2">Email</label>
          <input
            id="email"
            type="email"
            autocomplete="email"
            required
            placeholder="admin@dmsgbox.com"
            class="w-full px-4 py-3 rounded-xl bg-[#0F172A] border border-white/10 text-white placeholder-slate-600 text-sm focus-ring focus:border-teal-500/50 transition-colors duration-200"
          />
        </div>
        <div>
          <label for="password" class="block text-sm font-semibold text-slate-300 mb-2">Password</label>
          <input
            id="password"
            type="password"
            autocomplete="current-password"
            required
            placeholder="••••••••"
            class="w-full px-4 py-3 rounded-xl bg-[#0F172A] border border-white/10 text-white placeholder-slate-600 text-sm focus-ring focus:border-teal-500/50 transition-colors duration-200"
          />
        </div>

        <div id="login-error" class="hidden text-sm text-red-400 bg-red-400/10 rounded-lg px-4 py-3" role="alert"></div>

        <button
          type="submit"
          id="login-btn"
          class="w-full px-6 py-3.5 rounded-xl bg-teal-600 text-white font-bold text-sm hover:bg-teal-500 active:scale-[0.98] transition-all duration-200 focus-ring mt-2"
        >
          Sign In
        </button>
      </form>
    </div>

    <p class="mt-6 text-center text-xs text-slate-600">
      <a href="index.html" class="hover:text-slate-400 transition-colors duration-200 focus-ring rounded">&larr; Back to website</a>
    </p>
  </div>

  <script>
    const SUPABASE_URL      = 'https://bjpwckpmktnwtdzpmnvn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJqcHdja3Bta3Rud3RkenBtbnZuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwMDc1NTAsImV4cCI6MjA5MjU4MzU1MH0.BMHQDBEANQdZhm4_62Jh9sewdZnAxOZzvKcZCPUoDd0';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Already logged in → go straight to admin
    sb.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = 'admin.html';
    });

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('login-btn');
      const errEl    = document.getElementById('login-error');

      btn.disabled = true;
      btn.textContent = 'Signing in…';
      errEl.classList.add('hidden');

      const { error } = await sb.auth.signInWithPassword({ email, password });

      if (error) {
        errEl.textContent = error.message === 'Invalid login credentials'
          ? 'Invalid email or password.'
          : (error.message || 'Sign in failed. Please try again.');
        errEl.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Sign In';
      } else {
        window.location.href = 'admin.html';
      }
    });
  </script>
</body>
</html>
