<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DMsgBox — Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    .gradient-text {
      background: linear-gradient(135deg, #2DD4BF 0%, #38BDF8 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .focus-ring:focus-visible { outline: 2px solid #2DD4BF; outline-offset: 3px; }
  </style>
</head>
<body class="bg-[#0F172A] text-slate-100 antialiased min-h-screen">

  <!-- Nav -->
  <header class="fixed top-0 left-0 right-0 z-50 border-b border-white/5 bg-[#0F172A]/90 backdrop-blur-md">
    <div class="max-w-4xl mx-auto px-5 sm:px-8 h-16 flex items-center justify-between">
      <a href="index.html" class="text-lg font-bold tracking-tight text-white">
        DMsg<span class="gradient-text">Box</span>
      </a>
      <div class="flex items-center gap-3">
        <span id="nav-name" class="text-sm text-slate-400 hidden sm:block"></span>
        <button id="logout-btn"
          class="text-sm font-semibold px-4 py-2 rounded-lg bg-white/5 text-slate-300 border border-white/10 hover:bg-white/10 transition-colors focus-ring">
          Sign Out
        </button>
      </div>
    </div>
  </header>

  <main class="pt-24 pb-16 max-w-4xl mx-auto px-5 sm:px-8">

    <!-- Loading state -->
    <div id="loading" class="text-slate-500 text-sm text-center py-20">Loading your dashboard…</div>

    <!-- Dashboard content (hidden until loaded) -->
    <div id="content" class="hidden space-y-6">

      <!-- Welcome -->
      <div>
        <p class="text-teal-400 text-sm font-semibold uppercase tracking-widest mb-1">Dashboard</p>
        <h1 id="welcome-msg" class="text-3xl sm:text-4xl font-extrabold text-white">Welcome back</h1>
      </div>

      <!-- Status card -->
      <div class="rounded-2xl bg-[#1E293B] border border-white/5 p-6 flex items-start gap-4">
        <div id="status-icon" class="w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0 mt-0.5 bg-teal-500/10">
          <svg id="status-icon-svg" class="w-5 h-5 text-teal-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
        </div>
        <div>
          <p class="font-bold text-white mb-1" id="status-title">Waitlist Status</p>
          <p id="status-body" class="text-slate-400 text-sm leading-relaxed">Checking your status…</p>
        </div>
      </div>

      <!-- Profile card -->
      <div class="rounded-2xl bg-[#1E293B] border border-white/5 p-6 sm:p-8">
        <div class="flex items-center justify-between mb-6">
          <h2 class="text-base font-bold text-white">Your Profile</h2>
          <button id="edit-toggle" class="text-xs font-semibold px-3 py-1.5 rounded-lg bg-teal-600/10 text-teal-400 border border-teal-600/20 hover:bg-teal-600/20 transition-colors focus-ring">
            Edit
          </button>
        </div>

        <!-- View mode -->
        <div id="profile-view" class="space-y-4">
          <div class="flex items-center gap-4">
            <div class="w-12 h-12 rounded-full bg-teal-500/10 border border-teal-500/20 flex items-center justify-center flex-shrink-0">
              <span id="avatar-letter" class="text-teal-400 font-bold text-lg">?</span>
            </div>
            <div>
              <p id="profile-name" class="font-bold text-white">—</p>
              <p id="profile-email" class="text-slate-400 text-sm">—</p>
            </div>
          </div>
          <div class="pt-4 border-t border-white/5 grid grid-cols-2 gap-4 text-sm">
            <div>
              <p class="text-slate-500 mb-1">Member since</p>
              <p id="profile-joined" class="text-slate-300 font-medium">—</p>
            </div>
            <div>
              <p class="text-slate-500 mb-1">Account</p>
              <p class="text-teal-400 font-medium">Early Access</p>
            </div>
          </div>
        </div>

        <!-- Edit mode -->
        <form id="profile-form" class="hidden space-y-4">
          <div>
            <label for="edit-name" class="block text-sm font-semibold text-slate-300 mb-2">Full Name</label>
            <input id="edit-name" type="text" required
              class="w-full px-4 py-3 rounded-xl bg-[#0F172A] border border-white/10 text-white placeholder-slate-600 text-sm focus-ring focus:border-teal-500/50 transition-colors" />
          </div>
          <div id="profile-error" class="hidden text-sm text-red-400 bg-red-400/10 rounded-lg px-4 py-3"></div>
          <div id="profile-success" class="hidden text-sm text-teal-400 bg-teal-400/10 rounded-lg px-4 py-3"></div>
          <div class="flex gap-3">
            <button type="submit" id="save-btn"
              class="px-5 py-2.5 rounded-xl bg-teal-600 text-white font-bold text-sm hover:bg-teal-500 transition-colors focus-ring">
              Save Changes
            </button>
            <button type="button" id="cancel-btn"
              class="px-5 py-2.5 rounded-xl bg-white/5 text-slate-300 font-semibold text-sm border border-white/10 hover:bg-white/10 transition-colors focus-ring">
              Cancel
            </button>
          </div>
        </form>
      </div>

    </div>
  </main>

  <script>
    const SUPABASE_URL      = 'https://bjpwckpmktnwtdzpmnvn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJqcHdja3Bta3Rud3RkenBtbnZuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwMDc1NTAsImV4cCI6MjA5MjU4MzU1MH0.BMHQDBEANQdZhm4_62Jh9sewdZnAxOZzvKcZCPUoDd0';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const $ = id => document.getElementById(id);

    let currentUser = null;

    // ── Auth guard ───────────────────────────────────────────────
    sb.auth.getSession().then(({ data: { session } }) => {
      if (!session) { window.location.href = 'login.html'; return; }
      currentUser = session.user;
      loadDashboard(session.user);
    });

    // ── Load dashboard ───────────────────────────────────────────
    async function loadDashboard(user) {
      // Get profile
      const { data: profile } = await sb
        .from('profiles')
        .select('*')
        .eq('id', user.id)
        .single();

      const name = profile?.name || user.user_metadata?.name || user.email.split('@')[0];

      // Check waitlist status
      const { data: sub } = await sb
        .from('subscribers')
        .select('created_at')
        .eq('email', user.email)
        .maybeSingle();

      // Populate UI
      $('welcome-msg').textContent = `Welcome back, ${name.split(' ')[0]}`;
      $('nav-name').textContent = name;
      $('profile-name').textContent = name;
      $('profile-email').textContent = user.email;
      $('avatar-letter').textContent = name.charAt(0).toUpperCase();
      $('edit-name').value = name;
      $('profile-joined').textContent = new Date(user.created_at).toLocaleDateString('en-SG', {
        year: 'numeric', month: 'long', day: 'numeric'
      });

      if (sub) {
        $('status-title').textContent = '✓ You\'re on the waitlist';
        $('status-body').textContent = `You signed up on ${new Date(sub.created_at).toLocaleDateString('en-SG', { dateStyle: 'long' })}. We'll reach out as soon as early access opens.`;
      } else {
        $('status-icon').className = 'w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0 mt-0.5 bg-amber-500/10';
        $('status-icon-svg').className = 'w-5 h-5 text-amber-400';
        $('status-title').textContent = 'Not on the waitlist yet';
        $('status-body').innerHTML = `You haven't joined the waitlist. <a href="index.html#waitlist" class="text-teal-400 font-semibold underline hover:text-teal-300">Join now →</a>`;
      }

      $('loading').classList.add('hidden');
      $('content').classList.remove('hidden');
    }

    // ── Logout ───────────────────────────────────────────────────
    $('logout-btn').addEventListener('click', async () => {
      await sb.auth.signOut();
      window.location.href = 'index.html';
    });

    // ── Profile edit toggle ──────────────────────────────────────
    $('edit-toggle').addEventListener('click', () => {
      $('profile-view').classList.add('hidden');
      $('profile-form').classList.remove('hidden');
      $('edit-toggle').classList.add('hidden');
    });

    $('cancel-btn').addEventListener('click', () => {
      $('profile-view').classList.remove('hidden');
      $('profile-form').classList.add('hidden');
      $('edit-toggle').classList.remove('hidden');
      $('profile-error').classList.add('hidden');
      $('profile-success').classList.add('hidden');
    });

    // ── Save profile ─────────────────────────────────────────────
    $('profile-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = $('edit-name').value.trim();
      const btn  = $('save-btn');
      $('profile-error').classList.add('hidden');
      $('profile-success').classList.add('hidden');

      btn.disabled = true;
      btn.textContent = 'Saving…';

      const { error } = await sb
        .from('profiles')
        .upsert({ id: currentUser.id, name });

      btn.disabled = false;
      btn.textContent = 'Save Changes';

      if (error) {
        $('profile-error').textContent = error.message;
        $('profile-error').classList.remove('hidden');
        return;
      }

      // Update displayed name
      $('profile-name').textContent = name;
      $('nav-name').textContent = name;
      $('welcome-msg').textContent = `Welcome back, ${name.split(' ')[0]}`;
      $('avatar-letter').textContent = name.charAt(0).toUpperCase();

      $('profile-success').textContent = '✓ Profile updated successfully.';
      $('profile-success').classList.remove('hidden');
    });
  </script>
</body>
</html>
