<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DMsgBox — Sign In</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    .gradient-text {
      background: linear-gradient(135deg, #2DD4BF 0%, #38BDF8 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .focus-ring:focus-visible { outline: 2px solid #2DD4BF; outline-offset: 3px; }
  </style>
</head>
<body class="bg-[#0F172A] text-slate-100 antialiased min-h-screen flex items-center justify-center px-4 py-16">

  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <a href="index.html" class="text-xl font-bold tracking-tight text-white">
        DMsg<span class="gradient-text">Box</span>
      </a>
      <h1 class="mt-3 text-2xl font-extrabold text-white">Welcome back</h1>
      <p class="mt-2 text-slate-400 text-sm">Sign in to your DMsgBox account</p>
    </div>

    <div class="rounded-2xl bg-[#1E293B] border border-white/5 p-8">
      <form id="login-form" class="space-y-5" novalidate>

        <div>
          <label for="email" class="block text-sm font-semibold text-slate-300 mb-2">Email</label>
          <input id="email" name="email" type="email" required autocomplete="email" placeholder="jane@company.com.sg"
            class="w-full px-4 py-3 rounded-xl bg-[#0F172A] border border-white/10 text-white placeholder-slate-600 text-sm focus-ring focus:border-teal-500/50 transition-colors hover:border-white/20" />
        </div>

        <div>
          <div class="flex items-center justify-between mb-2">
            <label for="password" class="text-sm font-semibold text-slate-300">Password</label>
            <a href="reset-password.html" class="text-xs text-teal-400 hover:text-teal-300 transition-colors">Forgot password?</a>
          </div>
          <input id="password" name="password" type="password" required autocomplete="current-password" placeholder="••••••••"
            class="w-full px-4 py-3 rounded-xl bg-[#0F172A] border border-white/10 text-white placeholder-slate-600 text-sm focus-ring focus:border-teal-500/50 transition-colors hover:border-white/20" />
        </div>

        <div class="flex items-center gap-3">
          <input id="admin-mode" type="checkbox"
            class="w-4 h-4 rounded border border-white/20 bg-[#0F172A] accent-teal-500 cursor-pointer focus-ring" />
          <label for="admin-mode" class="text-sm text-slate-400 cursor-pointer select-none">Sign in as Admin</label>
        </div>

        <div id="form-error" class="hidden text-sm text-red-400 font-medium bg-red-400/10 rounded-lg px-4 py-3"></div>

        <button type="submit" id="submit-btn"
          class="w-full px-6 py-3.5 rounded-xl bg-teal-600 text-white font-bold text-sm hover:bg-teal-500 active:scale-[0.98] transition-all focus-ring">
          Sign In
        </button>
      </form>

      <p class="mt-6 text-center text-sm text-slate-500">
        Don't have an account?
        <a href="signup.html" class="text-teal-400 font-semibold hover:text-teal-300 transition-colors">Sign up</a>
      </p>
    </div>

    <p class="mt-6 text-center text-xs text-slate-600">
      <a href="index.html" class="hover:text-slate-400 transition-colors">← Back to home</a>
    </p>
  </div>

  <script>
    const SUPABASE_URL      = 'https://bjpwckpmktnwtdzpmnvn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJqcHdja3Bta3Rud3RkenBtbnZuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwMDc1NTAsImV4cCI6MjA5MjU4MzU1MH0.BMHQDBEANQdZhm4_62Jh9sewdZnAxOZzvKcZCPUoDd0';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Redirect if already logged in
    sb.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = 'dashboard.html';
    });

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email    = document.getElementById('email').value.trim().toLowerCase();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('submit-btn');
      const errEl    = document.getElementById('form-error');

      btn.disabled = true;
      btn.textContent = 'Signing in…';
      errEl.classList.add('hidden');

      const isAdmin = document.getElementById('admin-mode').checked;
      const { error } = await sb.auth.signInWithPassword({ email, password });

      if (error) {
        errEl.textContent = error.message;
        errEl.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Sign In';
        return;
      }

      window.location.href = isAdmin ? 'admin.html' : 'dashboard.html';
    });
  </script>
</body>
</html>
